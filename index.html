<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENVC — Pitch Başvurusu</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <style>
    body { background: #030712; margin: 0; font-family: sans-serif; }
    select, input, textarea { color-scheme: dark; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const sections = [
      {
        id: "basics",
        title: "Seni tanıyalım",
        fields: [
          { id: "name", label: "İsim Soyisim", type: "text", placeholder: "Miray İpek" },
          { id: "dept", label: "Bölüm & Sınıf", type: "text", placeholder: "Felsefe & Ekonomi, 3. sınıf" },
          { id: "linkedin", label: "LinkedIn (opsiyonel)", type: "text", placeholder: "linkedin.com/in/..." },
        ]
      },
      {
        id: "profile",
        title: "Neredesin?",
        fields: [
          {
            id: "stage", label: "Girişimcilik yolculuğunda şu an neredesin?", type: "select",
            options: [
              "Bir fikrim var, henüz kimseye anlatmadım",
              "Aktif olarak üzerinde çalışıyorum",
              "Bir ekibim var, ürün geliştirme aşamasındayız",
              "Yatırım aldım / almak üzereyim",
              "Girişimci olmaktan çok yatırım tarafını anlamak istiyorum",
            ]
          },
          {
            id: "sector", label: "İlgilendiğin sektör(ler)", type: "checkbox",
            options: ["Fintech", "SaaS / B2B", "Deep Tech", "Sağlık", "Eğitim", "Tüketici / B2C", "İklim / Sürdürülebilirlik", "Diğer"]
          },
        ]
      },
      {
        id: "pitch",
        title: "Fikrin varsa",
        fields: [
          { id: "idea", label: "Fikrini bir iki cümleyle anlat", type: "textarea", placeholder: "Çözdüğün problem ve nasıl çözüyorsun..." },
          {
            id: "looking", label: "Ne arıyorsun?", type: "checkbox",
            options: ["Co-founder", "Teknik ekip arkadaşı", "Mentor", "Yatırımcıyla tanışma fırsatı", "Feedback / pitch pratiği", "Sadece bu topluluğun içinde olmak"]
          },
        ]
      },
      {
        id: "wildcard",
        title: "Son bir şey",
        fields: [
          { id: "note", label: "Bize sormak istediğin bir şey var mı? Ya da eklemek istediğin?", type: "textarea", placeholder: "Serbest alan..." },
        ]
      }
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState({});
      const [submitted, setSubmitted] = useState(false);

      const section = sections[step];
      const update = (id, val) => setAnswers(a => ({ ...a, [id]: val }));
      const toggleCheck = (id, val) => {
        const cur = answers[id] || [];
        setAnswers(a => ({ ...a, [id]: cur.includes(val) ? cur.filter(x => x !== val) : [...cur, val] }));
      };

      return (
        <div style={{minHeight:"100vh",background:"#030712",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <div style={{width:"100%",maxWidth:"512px"}}>
            {!submitted ? (
              <>
                <div style={{marginBottom:"1.5rem"}}>
                  <p style={{fontSize:"0.75rem",color:"#818cf8",fontFamily:"monospace",marginBottom:"0.25rem"}}>ENVC — Pitch Başvurusu</p>
                  {step === 0 && (
                    <p style={{color:"#9ca3af",fontSize:"0.75rem",lineHeight:"1.5",marginBottom:"0.75rem"}}>
                      ENVC, Boğaziçi'ndeki girişimcilik odaklı öğrencileri bir araya getiren, fikir aşamasından yatırıma uzanan süreci destekleyen seçici bir topluluktur. Pitch desk, mentor ağı, VC bağlantıları ve yüksek yoğunluklu bir üretim ortamı sunuyoruz. Topluluğa katılım başvuruya tabidir.
                    </p>
                  )}
                  <h1 style={{fontSize:"1.25rem",fontWeight:"700",color:"white",margin:"0 0 0.75rem"}}>{section.title}</h1>
                  <div style={{display:"flex",gap:"4px"}}>
                    {sections.map((_, i) => (
                      <div key={i} style={{height:"4px",flex:1,borderRadius:"9999px",background: i <= step ? "#6366f1" : "#1f2937",transition:"all 0.3s"}} />
                    ))}
                  </div>
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:"1.25rem"}}>
                  {section.fields.map(f => (
                    <div key={f.id}>
                      <label style={{fontSize:"0.875rem",color:"#d1d5db",display:"block",marginBottom:"0.5rem"}}>{f.label}</label>
                      {f.type === "text" && (
                        <input value={answers[f.id] || ""} onChange={e => update(f.id, e.target.value)}
                          placeholder={f.placeholder}
                          style={{width:"100%",background:"#111827",border:"1px solid #374151",borderRadius:"0.5rem",padding:"0.625rem 0.75rem",fontSize:"0.875rem",color:"white",outline:"none",boxSizing:"border-box"}} />
                      )}
                      {f.type === "textarea" && (
                        <textarea value={answers[f.id] || ""} onChange={e => update(f.id, e.target.value)}
                          placeholder={f.placeholder} rows={3}
                          style={{width:"100%",background:"#111827",border:"1px solid #374151",borderRadius:"0.5rem",padding:"0.625rem 0.75rem",fontSize:"0.875rem",color:"white",outline:"none",resize:"none",boxSizing:"border-box"}} />
                      )}
                      {f.type === "select" && (
                        <select value={answers[f.id] || ""} onChange={e => update(f.id, e.target.value)}
                          style={{width:"100%",background:"#111827",border:"1px solid #374151",borderRadius:"0.5rem",padding:"0.625rem 0.75rem",fontSize:"0.875rem",color:"white",outline:"none",boxSizing:"border-box"}}>
                          <option value="">Seç...</option>
                          {f.options.map(o => <option key={o}>{o}</option>)}
                        </select>
                      )}
                      {f.type === "checkbox" && (
                        <div style={{display:"flex",flexWrap:"wrap",gap:"0.5rem"}}>
                          {f.options.map(o => {
                            const sel = (answers[f.id] || []).includes(o);
                            return (
                              <button key={o} onClick={() => toggleCheck(f.id, o)}
                                style={{padding:"0.375rem 0.75rem",borderRadius:"9999px",fontSize:"0.75rem",fontWeight:"500",border: sel ? "1px solid #6366f1" : "1px solid #374151",background: sel ? "#4f46e5" : "#111827",color: sel ? "white" : "#9ca3af",cursor:"pointer",transition:"all 0.2s"}}>
                                {o}
                              </button>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                <div style={{display:"flex",gap:"0.75rem",marginTop:"2rem"}}>
                  {step > 0 && (
                    <button onClick={() => setStep(s => s - 1)}
                      style={{flex:1,background:"#1f2937",color:"#d1d5db",padding:"0.625rem",borderRadius:"0.5rem",fontSize:"0.875rem",border:"none",cursor:"pointer"}}>
                      Geri
                    </button>
                  )}
                  {step < sections.length - 1 ? (
                    <button onClick={() => setStep(s => s + 1)}
                      style={{flex:1,background:"#4f46e5",color:"white",padding:"0.625rem",borderRadius:"0.5rem",fontSize:"0.875rem",fontWeight:"500",border:"none",cursor:"pointer"}}>
                      Devam
                    </button>
                  ) : (
                    <button onClick={() => setSubmitted(true)}
                      style={{flex:1,background:"#4f46e5",color:"white",padding:"0.625rem",borderRadius:"0.5rem",fontSize:"0.875rem",fontWeight:"500",border:"none",cursor:"pointer"}}>
                      Gönder
                    </button>
                  )}
                </div>
                <p style={{textAlign:"center",color:"#4b5563",fontSize:"0.75rem",marginTop:"0.75rem"}}>{step + 1} / {sections.length}</p>
              </>
            ) : (
              <div style={{textAlign:"center",padding:"4rem 0"}}>
                <div style={{fontSize:"2.5rem",marginBottom:"1rem"}}>🚀</div>
                <h2 style={{fontSize:"1.25rem",fontWeight:"700",color:"white",marginBottom:"0.5rem"}}>Teşekkürler!</h2>
                <p style={{color:"#9ca3af",fontSize:"0.875rem"}}>Başvurunu aldık. Yakında seninle iletişime geçeceğiz.</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
